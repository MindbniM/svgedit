<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="grad-blue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5B9BD5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2E75B6;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#70AD47;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#548235;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-orange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ED7D31;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C55A11;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#5B4FCF;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="#F8F9FA" rx="8"/>

  <!-- 标题 -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#333">Web 应用三层架构</text>

  <!-- ===== 前端层 ===== -->
  <text x="400" y="80" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">表示层 (Presentation Layer)</text>

  <!-- 浏览器 -->
  <rect x="120" y="95" width="160" height="70" rx="10" fill="url(#grad-blue)" filter="url(#shadow)"/>
  <text x="200" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">🌐 Web 浏览器</text>
  <text x="200" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">React / Vue</text>

  <!-- 移动端 -->
  <rect x="320" y="95" width="160" height="70" rx="10" fill="url(#grad-blue)" filter="url(#shadow)"/>
  <text x="400" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">📱 移动客户端</text>
  <text x="400" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">iOS / Android</text>

  <!-- 桌面端 -->
  <rect x="520" y="95" width="160" height="70" rx="10" fill="url(#grad-blue)" filter="url(#shadow)"/>
  <text x="600" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">🖥️ 桌面应用</text>
  <text x="600" y="147" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">Electron</text>

  <!-- 箭头：前端 → API -->
  <line x1="200" y1="165" x2="200" y2="240" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="165" x2="400" y2="240" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="165" x2="600" y2="240" stroke="#999" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- 连接标注 -->
  <text x="400" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888">HTTP / WebSocket / gRPC</text>

  <!-- ===== API 层 ===== -->
  <text x="400" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">业务逻辑层 (Business Logic Layer)</text>

  <!-- API 网关 -->
  <rect x="250" y="270" width="300" height="55" rx="10" fill="url(#grad-green)" filter="url(#shadow)"/>
  <text x="400" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white" font-weight="bold">🔒 API 网关 (Nginx / Kong)</text>
  <text x="400" y="313" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.85)">认证 · 限流 · 路由</text>

  <!-- 微服务 -->
  <rect x="80" y="345" width="150" height="55" rx="10" fill="url(#grad-orange)" filter="url(#shadow)"/>
  <text x="155" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">👤 用户服务</text>
  <text x="155" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">Node.js</text>

  <rect x="250" y="345" width="150" height="55" rx="10" fill="url(#grad-orange)" filter="url(#shadow)"/>
  <text x="325" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">📦 订单服务</text>
  <text x="325" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">Go</text>

  <rect x="420" y="345" width="150" height="55" rx="10" fill="url(#grad-orange)" filter="url(#shadow)"/>
  <text x="495" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">💰 支付服务</text>
  <text x="495" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">Java</text>

  <rect x="590" y="345" width="150" height="55" rx="10" fill="url(#grad-orange)" filter="url(#shadow)"/>
  <text x="665" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">📊 分析服务</text>
  <text x="665" y="388" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">Python</text>

  <!-- 箭头：网关 → 微服务 -->
  <line x1="310" y1="325" x2="155" y2="345" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="325" x2="325" y2="345" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="325" x2="495" y2="345" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="490" y1="325" x2="665" y2="345" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ===== 数据层 ===== -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#666">数据访问层 (Data Access Layer)</text>

  <!-- 箭头：微服务 → 数据库 -->
  <line x1="155" y1="400" x2="155" y2="450" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="325" y1="400" x2="325" y2="450" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="495" y1="400" x2="495" y2="450" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="665" y1="400" x2="665" y2="450" stroke="#999" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- 数据库 -->
  <rect x="80" y="450" width="150" height="55" rx="10" fill="url(#grad-purple)" filter="url(#shadow)"/>
  <text x="155" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">🗄️ PostgreSQL</text>
  <text x="155" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">关系型数据库</text>

  <rect x="250" y="450" width="150" height="55" rx="10" fill="url(#grad-purple)" filter="url(#shadow)"/>
  <text x="325" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">🍃 MongoDB</text>
  <text x="325" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">文档数据库</text>

  <rect x="420" y="450" width="150" height="55" rx="10" fill="url(#grad-purple)" filter="url(#shadow)"/>
  <text x="495" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">⚡ Redis</text>
  <text x="495" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">缓存 / 消息队列</text>

  <rect x="590" y="450" width="150" height="55" rx="10" fill="url(#grad-purple)" filter="url(#shadow)"/>
  <text x="665" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">📈 ClickHouse</text>
  <text x="665" y="493" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.85)">OLAP 分析</text>

  <!-- 底部说明 -->
  <text x="400" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#AAA">Generated by SVGEdit MCP Tools</text>
</svg>