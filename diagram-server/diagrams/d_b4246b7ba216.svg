<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2137;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" rx="40" fill="url(#bgGrad)"/>

  <!-- Robot Body -->
  <rect x="125" y="130" width="250" height="200" rx="30" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Antenna -->
  <line x1="250" y1="100" x2="250" y2="130" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
  <circle cx="250" cy="93" r="8" fill="#4fc3f7" filter="url(#glow)"/>

  <!-- Screen / Face -->
  <rect x="155" y="160" width="190" height="100" rx="15" fill="url(#screenGrad)"/>

  <!-- Eyes -->
  <circle cx="210" cy="200" r="15" fill="#4fc3f7" filter="url(#glow)"/>
  <circle cx="290" cy="200" r="15" fill="#4fc3f7" filter="url(#glow)"/>
  <circle cx="210" cy="200" r="6" fill="#fff"/>
  <circle cx="290" cy="200" r="6" fill="#fff"/>

  <!-- Smile -->
  <path d="M 215 235 Q 250 260 285 235" stroke="#4fc3f7" stroke-width="3" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Code brackets -->
  <text x="170" y="250" font-family="monospace" font-size="16" fill="#4fc3f7" opacity="0.5">&lt;/&gt;</text>
  <text x="290" y="250" font-family="monospace" font-size="16" fill="#4fc3f7" opacity="0.5">{}</text>

  <!-- Arms -->
  <rect x="95" y="180" width="25" height="80" rx="12" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="380" y="180" width="25" height="80" rx="12" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Legs -->
  <rect x="175" y="330" width="35" height="50" rx="10" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="290" y="330" width="35" height="50" rx="10" fill="url(#bodyGrad)" filter="url(#shadow)"/>

  <!-- Feet -->
  <rect x="165" y="370" width="55" height="20" rx="10" fill="#0288d1" filter="url(#shadow)"/>
  <rect x="280" y="370" width="55" height="20" rx="10" fill="#0288d1" filter="url(#shadow)"/>

  <!-- Text: CodeBuddy -->
  <text x="250" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="36" fill="#4fc3f7" filter="url(#glow)">CodeBuddy</text>

  <!-- Tagline -->
  <text x="250" y="468" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#78909c">Your AI Coding Companion</text>
</svg>